server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /version {
        default_type application/json;
        alias /usr/share/nginx/html/version.json;
    }

    location / {
        try_files $uri /index.html;
    }
}
