name: Renovate
on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: renovatebot/github-action@v46.1.5
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: renovate.json
