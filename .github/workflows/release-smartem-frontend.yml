name: Release smartem-frontend

on:
  push:
    branches: [main]
    tags: ['smartem-frontend-v*']
    paths:
      - 'apps/smartem/**'
      - 'packages/api/**'
      - 'packages/ui/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'scripts/write-version-json.mjs'
      - '.github/workflows/release-smartem-frontend.yml'
  pull_request:
    paths:
      - 'apps/smartem/**'
      - 'packages/api/**'
      - 'packages/ui/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'scripts/write-version-json.mjs'
      - '.github/workflows/release-smartem-frontend.yml'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'rc'
        type: choice
        options:
          - rc
          - stable

permissions:
  contents: read

env:
  APP_DIR: apps/smartem

jobs:
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_stable: ${{ steps.version.outputs.is_stable }}
      is_rc: ${{ steps.version.outputs.is_rc }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./$APP_DIR/package.json').version")
          echo "Base version: $BASE_VERSION"

          TS_VERSION=$(grep -m1 "FRONTEND_VERSION = '" $APP_DIR/src/version.ts | sed "s/.*'\([^']*\)'.*/\1/")
          echo "version.ts: $TS_VERSION"

          if [[ "$BASE_VERSION" != "$TS_VERSION" ]]; then
            echo "::error::Version mismatch! package.json=$BASE_VERSION, version.ts=$TS_VERSION"
            exit 1
          fi

          CLEAN_VERSION=$BASE_VERSION
          IS_STABLE="false"
          IS_RC="false"
          SHOULD_RELEASE="false"

          if [[ "$GITHUB_REF" == refs/tags/smartem-frontend-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/smartem-frontend-v}"
            IS_STABLE="true"
            SHOULD_RELEASE="true"
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            STABLE_TAG="smartem-frontend-v${CLEAN_VERSION}"
            if git tag -l "$STABLE_TAG" | grep -q "$STABLE_TAG"; then
              echo "Stable tag $STABLE_TAG already exists. Skipping RC release."
              VERSION="$CLEAN_VERSION"
            else
              VERSION="${CLEAN_VERSION}rc${{ github.run_number }}"
              IS_RC="true"
              SHOULD_RELEASE="true"
            fi
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.release_type }}" == "stable" ]]; then
              VERSION="$CLEAN_VERSION"
              IS_STABLE="true"
              SHOULD_RELEASE="true"
            else
              VERSION="${CLEAN_VERSION}rc${{ github.run_number }}"
              IS_RC="true"
              SHOULD_RELEASE="true"
            fi
          else
            VERSION="$CLEAN_VERSION"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_stable=$IS_STABLE" >> $GITHUB_OUTPUT
          echo "is_rc=$IS_RC" >> $GITHUB_OUTPUT
          echo "should_release=$SHOULD_RELEASE" >> $GITHUB_OUTPUT

          echo "Version: $VERSION"
          echo "Is stable: $IS_STABLE"
          echo "Is RC: $IS_RC"
          echo "Should release: $SHOULD_RELEASE"

  lint:
    name: Lint and typecheck
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate API client
        run: npm run api:generate -w @smartem/api

      - name: Biome check
        run: npm run check

      - name: Typecheck
        run: npm run typecheck

  build:
    name: Build SPA
    runs-on: ubuntu-latest
    needs: [version, lint]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate API client
        run: npm run api:generate -w @smartem/api

      - name: Write version.json
        env:
          FRONTEND_VERSION: ${{ needs.version.outputs.version }}
          GIT_SHA: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: node scripts/write-version-json.mjs

      - name: Build
        run: npm run build:smartem

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: smartem-dist
          path: ${{ env.APP_DIR }}/dist
          if-no-files-found: error
          retention-days: 7

      - name: Bundle analysis
        if: needs.version.outputs.should_release == 'true'
        run: npm run analyze -w @smartem/app

      - name: Upload bundle analysis
        if: needs.version.outputs.should_release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: smartem-bundle-analysis
          path: ${{ env.APP_DIR }}/bundle-analysis.html
          if-no-files-found: error
          retention-days: 7

  publish-container:
    name: Publish container to GHCR
    runs-on: ubuntu-latest
    needs: [version, build]
    if: needs.version.outputs.should_release == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/smartem-frontend
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest,enable=${{ needs.version.outputs.is_stable }}
          labels: |
            org.opencontainers.image.title=smartem-frontend
            org.opencontainers.image.description=SmartEM frontend SPA
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push container
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FRONTEND_VERSION=${{ needs.version.outputs.version }}
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, publish-container]
    if: needs.version.outputs.should_release == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine previous tag
        id: prev
        run: |
          PREV_TAG=$(git tag -l 'smartem-frontend-v*' --sort=-v:refname | grep -v 'rc' | head -n1 || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes body
        id: notes
        run: |
          IS_STABLE="${{ needs.version.outputs.is_stable }}"
          IS_RC="${{ needs.version.outputs.is_rc }}"
          VERSION="${{ needs.version.outputs.version }}"
          PREV_TAG="${{ steps.prev.outputs.prev_tag }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/smartem-frontend:${VERSION}"

          {
            echo "## smartem-frontend ${VERSION}"
            echo ""
            if [[ "$IS_RC" == "true" ]]; then
              echo "Release candidate. Not for production use."
              echo ""
            fi
            echo "### Container image"
            echo ""
            echo '```'
            echo "docker pull ${IMAGE}"
            echo '```'
            echo ""
            if [[ -n "$PREV_TAG" ]]; then
              echo "### Commits since ${PREV_TAG}"
              echo ""
              git log "${PREV_TAG}..HEAD" --oneline -- apps/smartem packages/api packages/ui | head -50 || true
            fi
          } > release-notes.md
          echo "body_path=release-notes.md" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: smartem-frontend-v${{ needs.version.outputs.version }}
          name: smartem-frontend v${{ needs.version.outputs.version }}
          prerelease: ${{ needs.version.outputs.is_rc == 'true' }}
          body_path: ${{ steps.notes.outputs.body_path }}
          target_commitish: ${{ github.sha }}
